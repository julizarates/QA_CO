<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA WH Tracker — Colombia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222536;
  --border: #2e3245;
  --text: #e8eaf0;
  --muted: #6b7280;
  --gold: #f5c842;
  --gold-bg: rgba(245,200,66,0.12);
  --silver: #94a3b8;
  --silver-bg: rgba(148,163,184,0.12);
  --bronze: #cd7f32;
  --bronze-bg: rgba(205,127,50,0.12);
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.header { padding:24px 32px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.header-left { display:flex; align-items:center; gap:12px; }
.flag { font-size:28px; }
.header-title h1 { font-size:20px; font-weight:700; color:var(--text); }
.header-title p { font-size:12px; color:var(--muted); margin-top:2px; }
.week-badge { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:12px; color:var(--muted); font-weight:500; }

/* SEARCH + FILTER */
.controls { padding:20px 32px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.search-wrap { position:relative; flex:1; min-width:200px; max-width:320px; }
.search-wrap input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 12px 9px 36px; font-size:13px; color:var(--text); outline:none; font-family:'Inter',sans-serif; }
.search-wrap input:focus { border-color:#3b82f6; }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--muted); }
.filter-group { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 14px; font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
.filter-btn:hover { border-color:#3b82f6; color:var(--text); }
.filter-btn.active { color:#fff; border-color:transparent; }
.filter-btn.active.all { background:#3b82f6; }
.filter-btn.active.gold { background:#b8860b; color:#fff; }
.filter-btn.active.silver { background:#4b5563; color:#fff; }
.filter-btn.active.bronze { background:#7c4a1a; color:#fff; }
.city-select { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:7px 12px; font-size:12px; color:var(--text); font-family:'Inter',sans-serif; cursor:pointer; outline:none; }
.city-select:focus { border-color:#3b82f6; }

/* SUMMARY BAR */
.summary { padding:0 32px 20px; display:flex; gap:12px; flex-wrap:wrap; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; min-width:100px; }
.stat-label { font-size:11px; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.stat-val { font-size:22px; font-weight:700; }
.stat-val.gold { color:var(--gold); }
.stat-val.silver { color:var(--silver); }
.stat-val.bronze { color:var(--bronze); }
.stat-val.blue { color:var(--blue); }

/* GRID */
.grid { padding:0 32px 32px; display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:16px; }

/* STORE CARD */
.store-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:border-color .15s, transform .1s; position:relative; overflow:hidden; }
.store-card:hover { border-color:#3b82f6; transform:translateY(-1px); }
.store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--radius) var(--radius) 0 0; }
.store-card.Gold::before { background:var(--gold); }
.store-card.Silver::before { background:var(--silver); }
.store-card.Bronze::before { background:var(--bronze); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.store-info h3 { font-size:15px; font-weight:600; color:var(--text); }
.store-info .city { font-size:12px; color:var(--muted); margin-top:2px; }
.cluster-badge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; letter-spacing:.05em; }
.cluster-badge.Gold { background:var(--gold-bg); color:var(--gold); }
.cluster-badge.Silver { background:var(--silver-bg); color:var(--silver); }
.cluster-badge.Bronze { background:var(--bronze-bg); color:var(--bronze); }

.qa-score-row { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
.qa-score { font-size:32px; font-weight:700; }
.qa-score.Gold { color:var(--gold); }
.qa-score.Silver { color:var(--silver); }
.qa-score.Bronze { color:var(--bronze); }
.qa-delta { font-size:13px; font-weight:600; display:flex; align-items:center; gap:3px; }
.qa-delta.up { color:var(--green); }
.qa-delta.down { color:var(--red); }
.qa-delta.flat { color:var(--muted); }

/* RANK ROW */
.rank-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.rank-badge { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:12px; font-weight:600; color:var(--text); }
.rank-total { font-size:12px; color:var(--muted); }
.rank-move { font-size:11px; font-weight:600; padding:2px 7px; border-radius:4px; }
.rank-move.up { background:rgba(34,197,94,.12); color:var(--green); }
.rank-move.down { background:rgba(239,68,68,.12); color:var(--red); }
.rank-move.flat { background:var(--surface2); color:var(--muted); }

/* MOVEMENT PILL */
.movement-pill { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; margin-bottom:12px; }
.movement-pill.up { background:rgba(34,197,94,.12); color:var(--green); }
.movement-pill.down { background:rgba(239,68,68,.12); color:var(--red); }
.movement-pill.flat { background:var(--surface2); color:var(--muted); }

/* PROGRESS BAR */
.progress-section { margin-bottom:12px; }
.progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:5px; }
.progress-bar { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width .3s; }
.progress-fill.Gold { background:var(--gold); }
.progress-fill.Silver { background:var(--silver); }
.progress-fill.Bronze { background:var(--bronze); }

/* NEXT CLUSTER */
.next-cluster { background:var(--surface2); border-radius:8px; padding:10px 12px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
.next-cluster span { font-size:11px; color:var(--muted); }
.next-cluster strong { font-size:12px; color:var(--text); font-weight:600; }

/* CRITICS */
.critics-section { }
.critics-title { font-size:11px; color:var(--muted); font-weight:500; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
.critics-list { display:flex; flex-wrap:wrap; gap:5px; }
.critic-chip { font-size:11px; font-weight:500; padding:3px 8px; border-radius:4px; background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.2); }
.no-critics { font-size:12px; color:var(--green); display:flex; align-items:center; gap:5px; }

/* SCORES BAR */
.scores-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px 10px; margin-top:10px; }
.score-row { display:flex; align-items:center; gap:6px; }
.score-name { font-size:10px; color:var(--muted); min-width:80px; }
.score-mini-bar { flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.score-mini-fill { height:100%; border-radius:2px; }
.score-mini-fill.ok { background:#22c55e; }
.score-mini-fill.bad { background:#ef4444; }
.score-val { font-size:10px; color:var(--muted); min-width:28px; text-align:right; }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:580px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--surface); }
.modal-header h2 { font-size:17px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; border-radius:4px; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:20px 24px 24px; }
.modal-section { margin-bottom:20px; }
.modal-section h4 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:600; margin-bottom:10px; }
.metrics-table { width:100%; border-collapse:collapse; }
.metrics-table tr { border-bottom:1px solid var(--border); }
.metrics-table tr:last-child { border-bottom:none; }
.metrics-table td { padding:8px 0; font-size:13px; }
.metrics-table td:first-child { color:var(--muted); width:50%; }
.metrics-table td:last-child { text-align:right; font-weight:600; }
.metric-ok { color:var(--green); }
.metric-bad { color:var(--red); }
.score-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.score-bar-label { font-size:12px; color:var(--muted); width:120px; }
.score-bar-wrap { flex:1; height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:4px; }
.score-bar-fill.ok { background:var(--green); }
.score-bar-fill.bad { background:var(--red); }
.score-bar-val { font-size:12px; font-weight:600; width:40px; text-align:right; }
.score-bar-val.ok { color:var(--green); }
.score-bar-val.bad { color:var(--red); }

@media(max-width:600px) {
  .header, .controls, .summary, .grid { padding-left:16px; padding-right:16px; }
  .grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="flag">🇨🇴</span>
    <div class="header-title">
      <h1>QA WH Tracker — Colombia</h1>
      <p id="subtitle">Cargando datos...</p>
    </div>
  </div>
  <span class="week-badge" id="week-badge">—</span>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" id="search" placeholder="Buscar tienda..." oninput="renderGrid()">
  </div>
  <div class="filter-group">
    <button class="filter-btn active all" onclick="setCluster('all')">Todas</button>
    <button class="filter-btn gold" onclick="setCluster('Gold')">🥇 Oro</button>
    <button class="filter-btn silver" onclick="setCluster('Silver')">🥈 Plata</button>
    <button class="filter-btn bronze" onclick="setCluster('Bronze')">🥉 Bronce</button>
  </div>
  <select class="city-select" id="city-filter" onchange="renderGrid()">
    <option value="">Todas las ciudades</option>
  </select>
</div>

<div class="summary">
  <div class="stat-card"><div class="stat-label">Total tiendas</div><div class="stat-val blue" id="s-total">—</div></div>
  <div class="stat-card"><div class="stat-label">🥇 Oro</div><div class="stat-val gold" id="s-gold">—</div></div>
  <div class="stat-card"><div class="stat-label">🥈 Plata</div><div class="stat-val silver" id="s-silver">—</div></div>
  <div class="stat-card"><div class="stat-label">🥉 Bronce</div><div class="stat-val bronze" id="s-bronze">—</div></div>
  <div class="stat-card"><div class="stat-label">QA Promedio</div><div class="stat-val blue" id="s-avg">—</div></div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">—</h2>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrKAbPuMqafnpN3sz2tKhmNtbz3hoNg1oBsCmfyDjz5yYgXpk1ijtMspfrmdIscEJkxfiGzbKtb6vb/pub?output=csv';

const METRIC_WEIGHTS = {'Picking Time':30,'Handoff Post':10,'Cancel Rate':10,'So Ops':15,'So System':10,'Total Stockouts':25,'Defect Rate':17,'ONA':8,'Total DR':25};

let allStores = [];
let filtered = [];
let activeCluster = 'all';
let lastWeek = '';
let prevWeek = '';

function parseCSV(text) {
  const lines = text.split('\n');
  let headerIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('SEMANA') && lines[i].includes('COUNTRY') && lines[i].includes('KEYWH')) {
      headerIdx = i; break;
    }
  }
  if (headerIdx < 0) return [];
  const headers = lines[headerIdx].split(',').map(h => h.trim().replace(/^,/,''));
  const rows = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const vals = lines[i].split(',');
    if (vals.length < 5) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim(); });
    rows.push(row);
  }
  return rows;
}

function buildStores(rows) {
  const coRows = rows.filter(r => r.COUNTRY === 'CO' && r.WH_NAME && r.WH_NAME.trim() !== '');
  const weeks = [...new Set(coRows.map(r => r.SEMANA))].sort();
  lastWeek = weeks[weeks.length - 1];
  prevWeek = weeks[weeks.length - 2] || '';

  return coRows.filter(r => r.SEMANA === lastWeek).map(r => {
    const critics = [];
    const criticMap = {'CRITIC_PICKING_TIME':'Picking Time','CRITIC_HANDOFF_POST':'Handoff Post','CRITIC_CR_PARTNER':'Cancel Rate','CRITIC_SO_OPS':'So Ops','CRITIC_SO_SYS':'So System','CRITIC_STOCKOUTS':'Total Stockouts','CRITIC_DEFECT_RATE':'Defect Rate','CRITIC_ONA':'ONA','CRITIC_TOTAL_DR':'Total DR'};
    Object.entries(criticMap).forEach(([col, name]) => { if (r[col] === '1') critics.push(name); });
    const scores = {
      'Picking Time': parseFloat(r.SCORE_PICKING_TIME) || 0,
      'Handoff Post': parseFloat(r.SCORE_HANDOFF_POST) || 0,
      'Cancel Rate': parseFloat(r.SCORE_CR_PARTNER) || 0,
      'So Ops': parseFloat(r.SCORE_SO_OPS) || 0,
      'So System': parseFloat(r.SCORE_SO_SYS) || 0,
      'Total Stockouts': parseFloat(r.SCORE_STOCKOUTS) || 0,
      'Defect Rate': parseFloat(r.SCORE_DEFECT_RATE) || 0,
      'ONA': parseFloat(r.SCORE_ONA) || 0,
      'Total DR': parseFloat(r.SCORE_TOTAL_DR) || 0,
    };
    return {
      key: r.KEYWH, name: r.WH_NAME,
      city: (r.CITY_NAME || '').replace(/BogotaExito|BogotÃ¡Exito/g,'Bogotá'),
      qa: parseFloat(r.QA_SCORE) || 0,
      cluster: r.CLUSTER,
      cluster_prev: r.CLUSTER_PREV || null,
      movement: r.CLUSTER_MOVEMENT || null,
      qa_delta: r.QA_SCORE_DELTA !== '' ? parseFloat(r.QA_SCORE_DELTA) : null,
      rank: parseInt(r.RANK_IN_COUNTRY) || 0,
      rank_prev: r.RANK_PREV !== '' ? parseInt(r.RANK_PREV) : null,
      rank_delta: r.RANK_DELTA !== '' ? parseInt(r.RANK_DELTA) : null,
      total_wh: parseInt(r.TOTAL_WH_IN_COUNTRY) || 0,
      pts_next: parseFloat(r.PTS_TO_NEXT_CLUSTER) || 0,
      critics, scores,
      total_grade: parseFloat(r.TOTAL_GRADE) || 0,
    };
  });
}

function clusterLabel(c) { return c === 'Gold' ? 'Oro' : c === 'Silver' ? 'Plata' : 'Bronce'; }
function clusterEmoji(c) { return c === 'Gold' ? '🥇' : c === 'Silver' ? '🥈' : '🥉'; }
function nextClusterName(c) { return c === 'Bronze' ? 'Plata' : 'Plata' ? 'Oro' : '—'; }
function nextClusterTarget(c) { return c === 'Bronze' ? 85 : c === 'Silver' ? 93 : 100; }

function movClass(m) {
  if (!m || m === 'Igual') return 'flat';
  if (m.includes('Subió')) return 'up';
  if (m.includes('Bajó')) return 'down';
  return 'flat';
}

function rankDeltaLabel(d) {
  if (d === null || d === undefined) return '';
  if (d < 0) return `<span class="rank-move up">▲ ${Math.abs(d)}</span>`;
  if (d > 0) return `<span class="rank-move down">▼ ${d}</span>`;
  return `<span class="rank-move flat">= </span>`;
}

function renderSummary(stores) {
  const gold = stores.filter(s => s.cluster === 'Gold').length;
  const silver = stores.filter(s => s.cluster === 'Silver').length;
  const bronze = stores.filter(s => s.cluster === 'Bronze').length;
  const avg = stores.length ? (stores.reduce((a,s) => a + s.qa, 0) / stores.length) : 0;
  document.getElementById('s-total').textContent = stores.length;
  document.getElementById('s-gold').textContent = gold;
  document.getElementById('s-silver').textContent = silver;
  document.getElementById('s-bronze').textContent = bronze;
  document.getElementById('s-avg').textContent = avg.toFixed(1);
}

function renderGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  const city = document.getElementById('city-filter').value;
  filtered = allStores.filter(s => {
    if (activeCluster !== 'all' && s.cluster !== activeCluster) return false;
    if (city && s.city !== city) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.city.toLowerCase().includes(q) && !s.key.toLowerCase().includes(q)) return false;
    return true;
  });
  renderSummary(filtered);
  const grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No se encontraron tiendas con esos filtros.</div>'; return; }
  grid.innerHTML = filtered.map(s => storeCard(s)).join('');
}

function storeCard(s) {
  const nextTarget = nextClusterTarget(s.cluster);
  const pct = s.cluster === 'Gold' ? 100 : Math.min(100, (s.qa / nextTarget) * 100);
  const deltaCls = s.qa_delta === null ? 'flat' : s.qa_delta > 0 ? 'up' : s.qa_delta < 0 ? 'down' : 'flat';
  const deltaStr = s.qa_delta !== null ? (s.qa_delta > 0 ? `+${s.qa_delta.toFixed(2)}` : s.qa_delta.toFixed(2)) : '';
  const movCls = movClass(s.movement);
  const movLabel = s.movement && s.movement !== 'Igual' ? s.movement : '';

  const criticsHtml = s.critics.length
    ? s.critics.map(c => `<span class="critic-chip">${c}</span>`).join('')
    : `<span class="no-critics">✓ Todas las métricas en target</span>`;

  const nextLabel = s.cluster === 'Bronze' ? `Faltan <strong>${s.pts_next.toFixed(1)} pts</strong> para Plata` :
                    s.cluster === 'Silver' ? `Faltan <strong>${s.pts_next.toFixed(1)} pts</strong> para Oro` :
                    '<strong>Nivel máximo ⭐</strong>';

  return `
  <div class="store-card ${s.cluster}" onclick="openModal('${s.key}')">
    <div class="card-top">
      <div class="store-info">
        <h3>${s.name}</h3>
        <div class="city">${s.city} · #${s.key}</div>
      </div>
      <span class="cluster-badge ${s.cluster}">${clusterEmoji(s.cluster)} ${clusterLabel(s.cluster)}</span>
    </div>

    <div class="qa-score-row">
      <span class="qa-score ${s.cluster}">${s.qa.toFixed(2)}</span>
      ${deltaStr ? `<span class="qa-delta ${deltaCls}">${deltaCls==='up'?'▲':deltaCls==='down'?'▼':''}${deltaStr}</span>` : ''}
    </div>

    <div class="rank-row">
      <span class="rank-badge">Puesto ${s.rank} de ${s.total_wh}</span>
      ${rankDeltaLabel(s.rank_delta)}
      ${s.rank_prev !== null ? `<span class="rank-total" style="font-size:11px;color:var(--muted)">antes: #${s.rank_prev}</span>` : ''}
    </div>

    ${movLabel ? `<div class="movement-pill ${movCls}">${movLabel}</div>` : ''}

    <div class="progress-section">
      <div class="progress-label">
        <span>${s.cluster === 'Gold' ? 'Nivel máximo' : `Hacia ${s.cluster === 'Bronze' ? 'Plata' : 'Oro'}`}</span>
        <span>${s.qa.toFixed(1)} / ${nextTarget}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${s.cluster}" style="width:${pct.toFixed(1)}%"></div></div>
    </div>

    <div class="next-cluster">
      <span>${nextLabel}</span>
    </div>

    <div class="critics-section">
      <div class="critics-title">Métricas a mejorar</div>
      <div class="critics-list">${criticsHtml}</div>
    </div>
  </div>`;
}

function openModal(key) {
  const s = allStores.find(x => x.key === key);
  if (!s) return;
  document.getElementById('modal-title').textContent = `${s.name} — ${s.city}`;
  const metrics = Object.entries(s.scores);
  const totalMax = 150;
  const barsHtml = metrics.map(([name, val]) => {
    const w = METRIC_WEIGHTS[name] || 0;
    const pct = w > 0 ? (val / w) * 100 : 100;
    const isBad = s.critics.includes(name);
    return `
    <div class="score-bar-row">
      <span class="score-bar-label">${name} <span style="color:var(--muted);font-size:10px">(/${w})</span></span>
      <div class="score-bar-wrap"><div class="score-bar-fill ${isBad?'bad':'ok'}" style="width:${Math.min(100,pct).toFixed(1)}%"></div></div>
      <span class="score-bar-val ${isBad?'bad':'ok'}">${val.toFixed(1)}</span>
    </div>`;
  }).join('');

  const nextTarget = nextClusterTarget(s.cluster);
  const clPrev = s.cluster_prev ? `${clusterEmoji(s.cluster_prev)} ${clusterLabel(s.cluster_prev)}` : '—';
  const clCurr = `${clusterEmoji(s.cluster)} ${clusterLabel(s.cluster)}`;

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <h4>Resumen semana</h4>
      <table class="metrics-table">
        <tr><td>QA Score</td><td class="${s.cluster==='Gold'?'metric-ok':''}">${s.qa.toFixed(2)}</td></tr>
        <tr><td>Semana anterior</td><td>${s.qa_delta !== null ? (s.qa - s.qa_delta).toFixed(2) : '—'}</td></tr>
        <tr><td>Variación</td><td class="${s.qa_delta > 0 ? 'metric-ok' : s.qa_delta < 0 ? 'metric-bad' : ''}">${s.qa_delta !== null ? (s.qa_delta > 0 ? '+' : '') + s.qa_delta.toFixed(2) : '—'}</td></tr>
        <tr><td>Cluster</td><td>${clCurr}</td></tr>
        <tr><td>Cluster anterior</td><td>${clPrev}</td></tr>
        <tr><td>Movimiento</td><td>${s.movement || '—'}</td></tr>
        <tr><td>Ranking en CO</td><td>#${s.rank} de ${s.total_wh}</td></tr>
        <tr><td>Ranking anterior</td><td>${s.rank_prev !== null ? '#' + s.rank_prev : '—'}</td></tr>
        <tr><td>Cambio ranking</td><td class="${s.rank_delta < 0 ? 'metric-ok' : s.rank_delta > 0 ? 'metric-bad' : ''}">${s.rank_delta !== null ? (s.rank_delta < 0 ? '▲ ' + Math.abs(s.rank_delta) + ' posiciones' : s.rank_delta > 0 ? '▼ ' + s.rank_delta + ' posiciones' : 'Sin cambio') : '—'}</td></tr>
        ${s.cluster !== 'Gold' ? `<tr><td>Puntos para subir</td><td class="metric-bad">${s.pts_next.toFixed(2)} pts para ${s.cluster === 'Bronze' ? 'Plata' : 'Oro'}</td></tr>` : ''}
      </table>
    </div>
    <div class="modal-section">
      <h4>Scores por métrica</h4>
      ${barsHtml}
    </div>
    ${s.critics.length ? `
    <div class="modal-section">
      <h4>Métricas críticas — qué trabajar para subir</h4>
      <div class="critics-list" style="gap:6px">${s.critics.map(c => `<span class="critic-chip" style="font-size:12px;padding:5px 10px">${c}</span>`).join('')}</div>
    </div>` : `
    <div class="modal-section">
      <p style="color:var(--green);font-size:13px">✓ Todas las métricas están en target esta semana.</p>
    </div>`}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

function setCluster(c) {
  activeCluster = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const map = {'all':'all','Gold':'gold','Silver':'silver','Bronze':'bronze'};
  document.querySelector(`.filter-btn.${map[c]}`).classList.add('active');
  renderGrid();
}

async function loadData() {
  try {
    const resp = await fetch(CSV_URL);
    const text = await resp.text();
    const rows = parseCSV(text);
    allStores = buildStores(rows);

    // header info
    const fmt = d => { const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
    document.getElementById('subtitle').textContent = `Semana ${fmt(lastWeek)} vs ${fmt(prevWeek)} · ${allStores.length} tiendas`;
    document.getElementById('week-badge').textContent = `Última actualización: ${fmt(lastWeek)}`;

    // populate city filter
    const cities = [...new Set(allStores.map(s => s.city).filter(Boolean))].sort();
    const sel = document.getElementById('city-filter');
    cities.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

    renderGrid();
  } catch(err) {
    document.getElementById('grid').innerHTML = `<div class="empty">Error cargando datos. Verifica que el Sheet esté publicado como CSV.<br><small>${err.message}</small></div>`;
    document.getElementById('subtitle').textContent = 'Error al cargar datos';
  }
}

loadData();
</script>
</body>
</html>
